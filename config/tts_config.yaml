primary:
  provider: chatterbox
  model: ResembleAI/Chatterbox
  params:
    cfgw: 0.5
    exaggeration: 0.4
    temperature: 0.7
    max_chars_per_call: 300
    voice_reference: "/Users/rushilkr/Downloads/voice_ref_morgan_combined.wav"

fallback:
  provider: f5_tts
  model: F5TTS_v1_Base         # or E2TTS for faster/lighter inference
  params:
    speed: 1.05                # slightly above 1.0 = natural podcast pace (~150 WPM)
    seed: -1                   # -1 = random seed per chunk (more natural variation)
    max_chars_per_call: 800    # ~130 words ~52 sec/chunk — preserves cross-sentence prosody
  voice_reference: "/Users/rushilkr/Downloads/voice_ref_morgan_combined.wav"
  voice_reference_text: "When I was 17 years old I could throw a baseball 90 miles an hour. You don't have to leave this planet to tell a good story."

segment_routing:
  # Chatterbox: short/punchy segments (expressive, <300 chars/call)
  chatterbox:
    - cold_open
    - intro
    - quick_hits
    - closing
  chatterbox:
    - cold_open
    - intro
    - quick_hits
    - closing
    - ai_updates
    - funding
    - india_tech
    - product_strategy
  f5_tts: []

output:
  format: mp3
  bitrate: 128k
  sample_rate: 44100
  silence_between_segments_ms: 1500
  silence_between_articles_ms: 800
  normalize_loudness: true
  target_lufs: -16
