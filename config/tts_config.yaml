primary:
  provider: chatterbox
  model: ResembleAI/Chatterbox
  params:
    cfgw: 0.5
    exaggeration: 0.4
    temperature: 0.7
    max_chars_per_call: 300
    voice_reference: "C:/Users/hp/Downloads/got_s1e1_bastard.wav"

fallback:
  provider: f5_tts
  model: F5TTS_v1_Base         # or E2TTS for faster/lighter inference
  params:
    speed: 1.05                # slightly above 1.0 = natural podcast pace (~150 WPM)
    seed: -1                   # -1 = random seed per chunk (more natural variation)
    max_chars_per_call: 800    # ~130 words ~52 sec/chunk — preserves cross-sentence prosody
  voice_reference: "C:/Users/hp/Downloads/got_s1e1_bastard.wav"
  voice_reference_text: "Let me give you some advice, bastard. Never forget what you are. The rest of the world will not. Wear it like honor, and it can never be used to hurt you. All dwarfs are bastards in their fathers' eyes."

segment_routing:
  # Chatterbox: short/punchy segments (expressive, <300 chars/call)
  chatterbox:
    - cold_open
    - intro
    - quick_hits
    - closing
  # F5-TTS: long-form segments (800 char chunks, better cross-sentence prosody)
  f5_tts:
    - ai_updates
    - funding
    - india_tech
    - product_strategy

output:
  format: mp3
  bitrate: 128k
  sample_rate: 44100
  silence_between_segments_ms: 1500
  silence_between_articles_ms: 800
  normalize_loudness: true
  target_lufs: -16
