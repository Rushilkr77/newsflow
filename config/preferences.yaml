user_profile:
  role: "Software Engineer building product awareness for AI PM and developer interviews at Series B+ startups"
  interests:
    - Major launches and announcements from big tech (Meta, Apple, NVIDIA, Google, OpenAI, Anthropic, Microsoft)
    - AI products and tools that change how software is built or used
    - Innovative non-AI products representing a real direction change (hardware, platforms)
    - Indian startup ecosystem — founders, funding, notable product launches
    - Funding and M&A in the AI/tech space
    - Business strategy: SaaS disruption, go-to-market, Series B+ company moves
    - Technical depth with product understanding — both engineering and market perspectives

priority_rules:
  P0_must_include:
    - "Product or model launch/announcement from: Meta, Apple, NVIDIA, Google (DeepMind included), OpenAI, Anthropic, or Microsoft — own announcements are always P0; credible third-party reporting of a real, verified launch is also P0. NOT eligible: pure opinion/review with no new product info, leaks, rumours, consumer entertainment (games, media, streaming)."
    - "AI making a significant real-world impact in any domain — tools or systems that change how software is built, agentic AI demonstrating new capabilities, or AI producing a verifiable breakthrough or shift in fields like security, scientific research, medicine, climate, manufacturing, or other industries"
    - "India tech ecosystem (any of the following): funding round >$5M, AI product launch by Indian company, notable exit or acquisition, notable founder/operator profile, senior hire or team move at a funded startup, or Indian AI/digital infrastructure policy"
    - "Non-AI hardware or software representing a genuine direction change (new form factor, platform shift, new category)"
    - "Funding rounds >$50M in the AI space — applies to both established big tech AND emerging AI-native companies such as Cursor, Perplexity, xAI, Mistral, Cohere, Character.AI, Midjourney, Runway, ElevenLabs, Stability AI, and similar players"
    - "Major product launch, valuation milestone (≥$10B), or high-profile strategic move (acquisition, key executive poaching, major partnership) by a rising AI-native company that is reshaping how software is built or used"

  P1_high:
    - "AI products from smaller or emerging startups"
    - "India tech industry shifts: IT sector disruption, outsourcing changes, Indian SaaS, India BPO automation"
    - "India fintech: AI in payments, UPI innovations, neobank product launches, embedded finance"
    - "Funding $10-50M in AI"
    - "Business strategy: go-to-market, pricing, Series B+ company moves"
    - "SaaS disruption stories with clear product or market angle"

  P2_if_space:
    - "Purely engineering or infrastructure deep dives with no product angle"
    - "Regulatory, safety, policy, or compliance news"
    - "Funding <$10M"
    - "Open-source milestones without a clear 'what does this unlock' angle"
    - "Incremental product updates with no significant strategic shift"
    - "New wearable device launches or major hardware updates (fitness trackers, health wearables, AR/VR/XR headsets, smart rings) — regardless of AI angle; hardware direction shifts matter"
    - "Major healthcare breakthroughs: significant disease cures, treatments, or medical inventions that could fundamentally change an industry or go mainstream — regardless of tech angle"

  P3_skip:
    - "Crypto or Web3 (unless: major institutional adoption, India crypto regulation, protocol launch affecting developer infra, or direct AI intersection)"
    - "Pure code tutorials or code walkthroughs"
    - "Sponsor or ad content within newsletters"
    - "Incremental consumer hardware with no meaningful leap"
    - "Generic career advice"
    - "Non-tech content: entertainment, sports, food, travel, lifestyle — even if mentioned by a tech company"
    - "Articles with titles shorter than 10 characters or titles that are all-uppercase with no spaces (e.g. 'COMPANY', 'TLDRTECH') — these are parsing artifacts"

# Rising AI-native companies — headlines about these companies involving large dollar
# amounts, product launches, or high-profile strategic events are P0, not P1/P2.
# Used by the curator to calibrate classification when snippet context is thin.
emerging_ai_companies:
  - Cursor
  - Perplexity
  - xAI
  - Mistral
  - Cohere
  - Character.AI
  - Midjourney
  - Runway
  - ElevenLabs
  - Stability AI
  - Harvey
  - Poolside
  - Cognition
  - Together AI
  - Groq
  - Hugging Face
  - Replit
  - Codeium

dedup:
  url_match: true
  title_similarity_threshold: 0.85
  content_similarity_threshold: 0.90
  semantic_dedup_threshold: 0.82
  source_priority_order:
    - harper_carroll
    - et_ai
    - ettech
    - techcrunch
    - tldr_ai
    - tldr             # base TLDR newsletter takes precedence over sub-variants in dedup
    - tldr_dev
    - tldr_devops
    - tldr_fintech
    - tldr_crypto
    - custom

time_budget:
  target_duration_min: 90
  min_duration_min: 40  # trigger expansion_mode re-run if script falls below this
  p0_deep_dive:
    duration_min_per_article: "5-7"
    max_articles: 6
    total_max_min: 35
  p1_standard:
    duration_min_per_article: "2-3"
    max_articles: 12
    total_max_min: 30
  p2_quick_hit:
    duration_sec_per_article: "30-60"
    max_articles: 15
    total_max_min: 12
  overhead:
    intro_min: 2
    transitions_min: 5
    closing_min: 5
