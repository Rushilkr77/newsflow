# Newsletter sender registry.
#
# To add a new newsletter:
#   1. Add an entry below with a unique id, sender_email, and parser.
#   2. Set enabled: true.
#   3. If the sender needs variant detection, set variant_detection accordingly.
#   4. For quick onboarding without a custom parser, set parser: generic
#      (extracts all <a href> links with surrounding text — works for most newsletters).
#
# Alternatively, add sender emails to NEWSLETTER_SENDERS in .env to use the
# generic parser without touching this file.
#
# IMPORTANT: TLDR variants all share dan@tldrnewsletter.com. Variant detection uses
# substring matching, so more specific display_name_match entries MUST come before
# the base "TLDR" catch-all. Order: AI → DevOps → Dev → Fintech → Crypto → TLDR (base).

senders:
  - id: tldr_ai
    enabled: true
    lookback_days: 2
    sender_email: dan@tldrnewsletter.com
    variant_detection: from_display_name
    display_name_match: "TLDR AI"
    priority_default: P0
    parser: tldr

  # More-specific TLDR variants must come BEFORE tldr (the base "TLDR" catch-all)
  # ── Mandatory TLDR sub-newsletter ─────────────────────────────────────────
  - id: tldr_dev
    enabled: true
    lookback_days: 2
    sender_email: dan@tldrnewsletter.com
    variant_detection: from_display_name
    display_name_match: "TLDR Dev"
    priority_default: P2
    parser: tldr

  # ── Optional TLDR sub-newsletters (fallback volume sources) ───────────────
  # These are fetched daily but their articles only fill the episode if the
  # mandatory sources (tldr_ai, tldr, tldr_dev) haven't reached the target length.
  # Articles are P2 by default — the time budget naturally gates inclusion.
  - id: tldr_devops
    enabled: true
    lookback_days: 2
    sender_email: dan@tldrnewsletter.com
    variant_detection: from_display_name
    display_name_match: "TLDR DevOps"
    priority_default: P2
    parser: tldr

  - id: tldr_fintech
    enabled: true
    lookback_days: 2
    sender_email: dan@tldrnewsletter.com
    variant_detection: from_display_name
    display_name_match: "TLDR Fintech"
    priority_default: P2
    parser: tldr

  - id: tldr_crypto
    enabled: true
    lookback_days: 2
    sender_email: dan@tldrnewsletter.com
    variant_detection: from_display_name
    display_name_match: "TLDR Crypto"
    priority_default: P2
    parser: tldr

  - id: tldr
    enabled: true
    lookback_days: 2
    sender_email: dan@tldrnewsletter.com
    variant_detection: from_display_name
    display_name_match: "TLDR"       # Base TLDR newsletter — catch-all, must be LAST among TLDR variants
    priority_default: P1
    parser: tldr

  - id: techcrunch
    enabled: true
    lookback_days: 2
    sender_email: newsletters@techcrunch.com
    variant_detection: none
    priority_default: P0
    parser: techcrunch

  - id: harper_carroll
    enabled: true
    lookback_days: 8        # Weekly newsletter — look back 8 days, keep most recent email
    sender_email: hai@harpercarrollai.com
    variant_detection: none  # Unique sender address — accept any email from this address
    priority_default: P0
    parser: harper_carroll

  - id: ettech
    enabled: true
    lookback_days: 2
    sender_email: newsletter@ettech.com
    variant_detection: none
    priority_default: P1
    parser: ettech

  - id: et_ai
    enabled: true
    lookback_days: 2
    sender_email: newsletter@economictimesnews.com
    variant_detection: from_display_name
    display_name_match: "ET AI"
    subject_prefix: "ET AI:"
    priority_default: P1
    parser: et_ai

excluded_variants:
  - sender: dan@tldrnewsletter.com
    patterns:
      - "TLDR FOUNDERS"              # Out of scope for AI PM prep
  - sender: newsletter@economictimesnews.com
    exclude_display_names:
      - "The Economic Times"         # Non-AI ET newsletter — exclude
